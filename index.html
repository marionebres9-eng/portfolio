<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Nebres Jr. | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; }

        /* --- Navigation --- */
        nav { 
            position: fixed; top: 0; width: 100%; padding: 0.8rem 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); 
            z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .logo { font-size: 1.3rem; font-weight: 600; color: var(--primary-color); letter-spacing: 1.5px; }
        .nav-links { 
            display: flex; list-style: none; background: rgba(255, 255, 255, 0.05); 
            padding: 0.3rem 1rem; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); gap: 0.5rem; 
        }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-size: 1.1rem; padding: 0.6rem; display: flex; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary-color); transform: scale(1.15); }

        /* --- Layout --- */
        section { padding: 100px 10% 60px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .hero { align-items: center; text-align: center; }
        .profile-img-container { 
            width: 160px; height: 160px; border-radius: 50%; margin-bottom: 2rem; 
            border: 4px solid var(--primary-color); padding: 4px; 
            background: linear-gradient(45deg, var(--primary-color), #c084fc);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3); overflow: hidden; 
        }
        .profile-img-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .hero h1 { font-size: clamp(2.2rem, 7vw, 3.2rem); margin-bottom: 1rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        h2 { font-size: 2rem; margin-bottom: 2.5rem; text-align: center; }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        
        .display-card { 
            background: var(--card-bg); padding: 12px; border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s;
        }
        .display-card:hover { transform: translateY(-5px); border-color: var(--primary-color); }
        .display-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; display: block; margin-bottom: 1rem; }

        /* --- Resume Card --- */
        .resume-card { cursor: pointer; text-align: center; padding: 4rem 2rem; max-width: 600px; margin: 0 auto; }
        .resume-card:hover { background: rgba(99, 102, 241, 0.1); }

        /* --- Modal Styles --- */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(8px);
        }
        .modal-content {
            position: relative; background: #1e293b; margin: 2% auto;
            width: 90%; max-width: 600px; height: 85vh; border-radius: 20px;
            display: flex; flex-direction: column; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .close-modal { position: absolute; top: -45px; right: 0; color: #fff; font-size: 35px; cursor: pointer; }
        
        /* Image Preview Area */
        .preview-area { 
            flex-grow: 1; overflow-y: auto; padding: 20px; 
            scrollbar-width: thin; scrollbar-color: var(--primary-color) #1e293b;
        }
        .resume-preview-img { width: 100%; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .modal-footer { padding: 20px; text-align: center; background: rgba(15, 23, 42, 0.5); border-radius: 0 0 20px 20px; }

        footer { text-align: center; padding: 2rem; color: var(--text-dim); font-size: 0.8rem; }

        @media (max-width: 768px) {
            .modal-content { height: 80vh; margin-top: 15%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">PORTFOLIO</div>
        <ul class="nav-links">
            <li><a href="#home"><i class="fa-solid fa-house"></i></a></li>
            <li><a href="#about"><i class="fa-solid fa-user"></i></a></li>
            <li><a href="#achievements"><i class="fa-solid fa-trophy"></i></a></li>
            <li><a href="#projects"><i class="fa-solid fa-briefcase"></i></a></li>
            <li><a href="#resume"><i class="fa-solid fa-file-pdf"></i></a></li>
        </ul>
    </nav>

    <section id="home" class="hero">
        <div class="profile-img-container"><img src="e.jpg" alt="Profile"></div>
        <h1>Programmer</h1>
        <p>Mario Nebres Jr. | Building clean, efficient code solutions.</p>
    </section>

    <section id="resume">
        <h2>Resume</h2>
        <div class="display-card resume-card" id="resumeCard">
            <i class="fa-solid fa-file-pdf" style="font-size: 3.5rem; color: var(--primary-color); margin-bottom: 1rem;"></i>
            <h3 style="margin-bottom: 1rem;">Professional CV</h3>
            <p style="color: var(--text-dim); margin-bottom: 1.5rem;">Click anywhere on this box to preview my resume.</p>
            <span style="color: var(--primary-color); font-weight: 600; font-size: 0.9rem;">VIEW PREVIEW</span>
        </div>
    </section>

    <div id="resumeModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            
            <div class="preview-area">
                <img src="resume-preview.jpg" alt="Resume Preview" class="resume-preview-img">
            </div>

            <div class="modal-footer">
                <a href="resume.pdf" download="Mario_Nebres_Resume.pdf" style="display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: white; background: var(--primary-color); padding: 0.8rem 2.5rem; border-radius: 10px; font-weight: 600; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);">
                    <i class="fa-solid fa-download"></i> Download PDF
                </a>
            </div>
        </div>
    </div>

    <footer><p>&copy; 2026 Portfolio Design</p></footer>

    <script>
        const modal = document.getElementById("resumeModal");
        const resumeCard = document.getElementById("resumeCard");
        const closeBtn = document.getElementById("closeModal");

        resumeCard.onclick = () => {
            modal.style.display = "block";
            document.body.style.overflow = "hidden";
        }

        closeBtn.onclick = () => {
            modal.style.display = "none";
            document.body.style.overflow = "auto";
        }

        window.onclick = (event) => {
            if (event.target == modal) {
                modal.style.display = "none";
                document.body.style.overflow = "auto";
            }
        }
    </script>
</body>
</html>
